<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能车位检测系统</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: #0f1923;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.header {
  text-align: center;
  padding: 30px 20px 10px;
}
.header h1 { font-size: 28px; color: #fff; margin-bottom: 6px; }
.header p  { font-size: 14px; color: #8899aa; }

/* 车位卡片 */
.park-grid {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 30px 20px;
}
.park-card {
  width: 280px;
  background: #1a2733;
  border-radius: 16px;
  padding: 30px 20px;
  text-align: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  transition: transform 0.3s, box-shadow 0.3s;
}
.park-card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.park-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  transition: background 0.5s, box-shadow 0.5s;
}
.park-id { font-size: 18px; color: #ffffff; margin-bottom: 6px; }
.park-status {
  font-size: 22px; font-weight: bold; margin-bottom: 4px;
}
.park-time { font-size: 12px; color: #556677; margin-top: 8px; }

/* 状态颜色 */
.state-free     { background: #0d2818; box-shadow: 0 0 20px rgba(0,255,100,0.2); }
.park-card.state-free  .park-icon { background: #1a4a2e; }
.park-card.state-free  .park-status { color: #4cff88; }

.state-occupied { background: #281010; box-shadow: 0 0 20px rgba(255,60,60,0.2); }
.park-card.state-occupied .park-icon { background: #4a1a1a; }
.park-card.state-occupied .park-status { color: #ff5555; }

.state-unknown  { background: #1a1a2e; box-shadow: 0 0 20px rgba(100,100,200,0.15); }
.park-card.state-unknown  .park-icon { background: #2a2a3e; }
.park-card.state-unknown  .park-status { color: #8899aa; }

/* 状态指示灯 */
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
.dot-free     { background:#4cff88; box-shadow:0 0 8px #4cff88; }
.dot-occupied { background:#ff5555; box-shadow:0 0 8px #ff5555; animation:blink 1s infinite; }
.dot-unknown  { background:#8899aa; }
@keyframes blink { 50% { opacity:0.3; } }

/* 更新时间 */
.last-update {
  text-align: center;
  font-size: 13px;
  color: #445566;
  padding: 4px 0 20px;
}

/* 历史记录 */
.history {
  width: 100%; max-width: 700px;
  margin: 0 auto 40px;
  padding: 0 20px;
}
.history h2 { font-size: 18px; color: #8899aa; margin-bottom: 12px; text-align: center; }
.history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.history-table th {
  background: #1a2733;
  color: #8899aa;
  padding: 10px 14px;
  text-align: left;
  font-weight: normal;
}
.history-table td {
  padding: 8px 14px;
  border-bottom: 1px solid #1a2733;
}
.history-table tr:hover td { background: #1a2733; }
.tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: bold;
}
.tag-free     { background: #0d2818; color: #4cff88; }
.tag-occupied { background: #281010; color: #ff5555; }
.tag-unknown  { background: #1a1a2e; color: #8899aa; }

/* footer */
.footer {
  text-align: center;
  font-size: 12px;
  color: #445566;
  padding: 20px;
}
</style>
</head>
<body>

<div class="header">
  <h1>智能车位检测系统</h1>
  <p>Smart Parking Edge Terminal · 实时车位监控</p>
</div>

<div class="park-grid" id="parkGrid">
  <div class="park-card state-unknown" id="card-1">
    <div class="park-icon">🅿️</div>
    <div class="park-id">车位 #1</div>
    <div class="park-status"><span class="dot dot-unknown"></span>等待数据</div>
    <div class="park-time">--</div>
  </div>
</div>

<div class="last-update" id="lastUpdate">上次更新: --</div>

<div class="history">
  <h2>历史记录</h2>
  <table class="history-table">
    <thead>
      <tr><th>时间</th><th>车位</th><th>状态</th></tr>
    </thead>
    <tbody id="historyBody">
      <tr><td colspan="3" style="text-align:center;color:#556677;">暂无数据</td></tr>
    </tbody>
  </table>
</div>

<div class="footer">
  SmartParkingEdgeTerminal &copy; 2026
</div>

<script>
const STATE_CLASS  = {0:'unknown', 1:'free', 2:'occupied'};
const STATE_LABEL  = {0:'未知', 1:'空闲', 2:'占用'};
const STATE_ICON   = {0:'❓', 1:'✅', 2:'🚗'};
const STATE_DOT    = {0:'unknown', 1:'free', 2:'occupied'};

function updateUI() {
  fetch('/api/park/status')
    .then(r => r.json())
    .then(data => {
      if (!data.length) return;

      data.forEach(p => {
        const card = document.getElementById('card-' + p.park_id);
        if (!card) return;

        const cls = STATE_CLASS[p.state];
        card.className = 'park-card state-' + cls;
        card.querySelector('.park-icon').textContent = STATE_ICON[p.state];
        card.querySelector('.park-status').innerHTML =
          '<span class="dot dot-' + STATE_DOT[p.state] + '"></span>' + STATE_LABEL[p.state];
        card.querySelector('.park-time').textContent =
          '更新时间: ' + (p.updated_at || '--');
      });

      document.getElementById('lastUpdate').textContent =
        '上次更新: ' + new Date().toLocaleTimeString('zh-CN');
    });

  fetch('/api/park/history?limit=20')
    .then(r => r.json())
    .then(data => {
      const tbody = document.getElementById('historyBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:#556677;">暂无数据</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(r =>
        '<tr>' +
        '<td>' + r.timestamp + '</td>' +
        '<td>车位 #' + r.park_id + '</td>' +
        '<td><span class="tag tag-' + STATE_CLASS[r.state] + '">' + STATE_LABEL[r.state] + '</span></td>' +
        '</tr>'
      ).join('');
    });
}

// 页面加载后立即获取，然后每3秒刷新
updateUI();
setInterval(updateUI, 3000);
</script>

</body>
</html>
